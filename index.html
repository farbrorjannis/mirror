<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist's Mirror Tool</title>
    <style>
        :root {
            --bg-color: #f5f2e9;
            --card-bg: #ffffff;
            --text-color: #4a3728;
            --accent-color: #8d7b68;
            --secondary-btn: #e0e0e0;
            --secondary-btn-hover: #d0d0d0;
            --primary-btn: #4a3728;
            --primary-btn-hover: #3a2718;
            --canvas-border: #d0c0b0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 32px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            max-width: 800px;
            width: 100%;
            text-align: center;
        }

        h1 {
            font-size: 1.8rem;
            margin-bottom: 0.5rem;
            font-weight: 700;
        }

        p {
            opacity: 0.8;
            margin-bottom: 2.5rem;
            font-style: italic;
        }

        .canvas-container {
            background-color: #fafafa;
            border-radius: 20px;
            margin-bottom: 2.5rem;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 350px;
            border: 2px dashed var(--canvas-border);
            padding: 10px;
        }

        canvas {
            max-width: 100%;
            max-height: 70vh;
            display: none;
            border-radius: 12px;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(110px, 1fr));
            gap: 12px;
            justify-content: center;
        }

        button, .upload-label {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px 18px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s ease;
            text-decoration: none;
            font-size: 0.9rem;
            display: inline-flex;
            justify-content: center;
            align-items: center;
        }

        button:hover, .upload-label:hover {
            transform: translateY(-2px);
            opacity: 0.95;
        }

        #upload {
            display: none;
        }

        .btn-secondary {
            background-color: var(--secondary-btn);
            color: var(--text-color);
        }

        .btn-secondary:hover {
            background-color: var(--secondary-btn-hover);
        }

        .btn-primary {
            background-color: var(--primary-btn);
            color: white;
        }
        
        .btn-primary:hover {
            background-color: var(--primary-btn-hover);
        }

    </style>
</head>
<body>

<div class="container">
    <h1>🎨 Artist's Mirror</h1>
    <p>Upload, flip, and check your composition. B&W to check values, Grid for proportions.</p>

    <div class="canvas-container" id="drop-zone">
        <span id="placeholder-text">Click below to upload an image</span>
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <label for="upload" class="upload-label btn-primary">Upload Image</label>
        <input type="file" id="upload" accept="image/*">
        
        <button onclick="flipHorizontal()">Flip Horizontal</button>
        <button onclick="flipVertical()">Flip Vertical</button>
        <button onclick="toggleGrayscale()" class="btn-secondary">B&W Toggle</button>
        <button onclick="toggleGrid()" class="btn-secondary">Grid Toggle</button>
        <button onclick="downloadImage()" class="btn-primary">Download</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const upload = document.getElementById('upload');
    const placeholderText = document.getElementById('placeholder-text');
    
    let originalImage = new Image();
    let isGrayscale = false;
    let isGridVisible = false;
    let scaleX = 1;
    let scaleY = 1;

    upload.addEventListener('change', (e) => {
        const file = e.target.files[0];
        const reader = new FileReader();

        reader.onload = (event) => {
            originalImage.onload = () => {
                renderImage();
                canvas.style.display = 'block';
                placeholderText.style.display = 'none';
            };
            originalImage.src = event.target.result;
        };
        reader.readAsDataURL(file);
    });

    function renderImage() {
        canvas.width = originalImage.width;
        canvas.height = originalImage.height;
        
        ctx.clearRect(0, 0, canvas.width, canvas.height);
        ctx.save();
        
        // Handle Mirroring (transformation should match the image's orientation)
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.scale(scaleX, scaleY);
        ctx.translate(-canvas.width/2, -canvas.height/2);
        
        // Draw the image onto the canvas with transformations
        ctx.drawImage(originalImage, 0, 0);

        // Apply Grayscale to the image ONLY, while within the transformed state
        if (isGrayscale) {
            const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
            const data = imageData.data;
            for (let i = 0; i < data.length; i += 4) {
                const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                data[i] = avg;     // Red
                data[i + 1] = avg; // Green
                data[i + 2] = avg; // Blue
            }
            ctx.putImageData(imageData, 0, 0);
        }
        
        ctx.restore(); // Restore context to default (no transformation)

        // Draw the fixed grid on TOP of the whole canvas, after transformation and grayscale
        if (isGridVisible) {
            drawGrid();
        }
    }

    function drawGrid() {
        // A simple 10x10 grid for checking proportions
        const rows = 10;
        const cols = 10;
        const stepX = canvas.width / cols;
        const stepY = canvas.height / rows;

        ctx.lineWidth = 1;
        ctx.strokeStyle = 'rgba(150, 150, 150, 0.4)'; // Subtle light gray grid lines

        // Draw vertical lines
        for (let x = 0; x <= canvas.width; x += stepX) {
            ctx.beginPath();
            ctx.moveTo(x, 0);
            ctx.lineTo(x, canvas.height);
            ctx.stroke();
        }

        // Draw horizontal lines
        for (let y = 0; y <= canvas.height; y += stepY) {
            ctx.beginPath();
            ctx.moveTo(0, y);
            ctx.lineTo(canvas.width, y);
            ctx.stroke();
        }
    }

    function flipHorizontal() {
        scaleX *= -1;
        renderImage();
    }

    function flipVertical() {
        scaleY *= -1;
        renderImage();
    }

    function toggleGrayscale() {
        isGrayscale = !isGrayscale;
        renderImage();
    }

    function toggleGrid() {
        isGridVisible = !isGridVisible;
        renderImage();
    }

    function downloadImage() {
        const link = document.createElement('a');
        link.download = 'artist-mirror-artwork.png';
        link.href = canvas.toDataURL();
        link.click();
    }
</script>

</body>
</html>
