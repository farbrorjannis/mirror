<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist's Mirror Tool</title>
    <style>
        :root {
            --bg-color: #f5f2e9;
            --card-bg: #ffffff;
            --text-color: #4a3728;
            --accent-color: #8d7b68;
            --secondary-btn: #e0e0e0;
            --secondary-btn-hover: #d0d0d0;
            --primary-btn: #4a3728;
            --primary-btn-hover: #3a2718;
            --canvas-border: #d0c0b0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2.5rem;
            border-radius: 32px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        .canvas-container {
            background-color: #eee;
            border-radius: 20px;
            margin-bottom: 2rem;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            border: 2px dashed var(--canvas-border);
        }

        canvas {
            max-width: 100%;
            max-height: 75vh;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
            gap: 12px;
        }

        button, .upload-label {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 14px;
            border-radius: 14px;
            cursor: pointer;
            font-weight: 600;
            transition: all 0.2s;
            font-size: 0.85rem;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        button:hover, .upload-label:hover {
            transform: translateY(-2px);
            filter: brightness(1.1);
        }

        #upload { display: none; }
        .btn-secondary { background-color: var(--secondary-btn); color: var(--text-color); }
        .btn-primary { background-color: var(--primary-btn); color: white; }

        h1 { margin-top: 0; }
        p { margin-bottom: 2rem; opacity: 0.7; }
    </style>
</head>
<body>

<div class="container">
    <h1>🎨 Artist's Mirror</h1>
    <p>Check your proportions and values easily.</p>

    <div class="canvas-container">
        <span id="placeholder">Upload an image to start</span>
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <label for="upload" class="upload-label btn-primary">1. Upload</label>
        <input type="file" id="upload" accept="image/*">
        
        <button onclick="flipH()">Flip Horizontal</button>
        <button onclick="flipV()">Flip Vertical</button>
        <button onclick="toggleBW()" class="btn-secondary">B&W Mode</button>
        <button onclick="toggleGrid()" class="btn-secondary">Grid Overlay</button>
        
        <button onclick="download()" class="btn-primary">Download</button>
    </div>
</div>

<script>
    const canvas = document.getElementById('canvas');
    const ctx = canvas.getContext('2d');
    const upload = document.getElementById('upload');
    const placeholder = document.getElementById('placeholder');
    
    let img = new Image();
    let showBW = false;
    let showGrid = false;
    let sX = 1;
    let sV = 1;

    upload.onchange = (e) => {
        const reader = new FileReader();
        reader.onload = (event) => {
            img.onload = () => {
                placeholder.style.display = 'none';
                canvas.style.display = 'block';
                render();
            };
            img.src = event.target.result;
        };
        reader.readAsDataURL(e.target.files[0]);
    };

    function render() {
        if (!img.src) return;

        canvas.width = img.width;
        canvas.height = img.height;

        ctx.clearRect(0, 0, canvas.width, canvas.height);
        
        ctx.save();
        
        // 1. Hantera Filter (Svartvitt)
        ctx.filter = showBW ? 'grayscale(100%)' : 'none';

        // 2. Hantera Spegling
        ctx.translate(canvas.width/2, canvas.height/2);
        ctx.scale(sX, sV);
        ctx.translate(-canvas.width/2, -canvas.height/2);
        
        // 3. Rita bilden
        ctx.drawImage(img, 0, 0);
        
        ctx.restore(); //
