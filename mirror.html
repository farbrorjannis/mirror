<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Artist's Mirror Tool – akvarellskiss.se</title>
    <style>
        :root {
            --bg-color: #f5f2e9;
            --card-bg: #ffffff;
            --text-color: #4a3728;
            --accent-color: #8d7b68;
            --secondary-btn: #e0e0e0;
            --secondary-btn-hover: #d0d0d0;
            --primary-btn: #4a3728;
            --primary-btn-hover: #3a2718;
            --canvas-border: #d0c0b0;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
            box-sizing: border-box;
        }

        .container {
            background-color: var(--card-bg);
            padding: 2rem;
            border-radius: 32px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.06);
            max-width: 900px;
            width: 100%;
            text-align: center;
        }

        .brand {
            font-size: 0.75rem;
            color: var(--accent-color);
            letter-spacing: 0.05em;
            margin-bottom: 0.25rem;
        }

        .brand a {
            color: var(--accent-color);
            text-decoration: none;
        }

        .brand a:hover {
            text-decoration: underline;
        }

        h2 {
            margin-top: 0;
            margin-bottom: 0.25rem;
        }

        .canvas-container {
            background-color: #e5e5e5;
            border-radius: 20px;
            margin-bottom: 1.5rem;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 400px;
            border: 2px dashed var(--canvas-border);
            position: relative;
        }

        #placeholder {
            color: var(--accent-color);
            font-size: 0.95rem;
            padding: 2rem;
        }

        canvas {
            max-width: 100%;
            max-height: 70vh;
            display: none;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(120px, 1fr));
            gap: 10px;
        }

        button, .upload-label {
            background-color: var(--accent-color);
            color: white;
            border: none;
            padding: 12px;
            border-radius: 12px;
            cursor: pointer;
            font-weight: 600;
            transition: 0.2s;
            font-size: 0.85rem;
        }

        button:hover, .upload-label:hover {
            filter: brightness(1.1);
            transform: translateY(-1px);
        }

        #upload { display: none; }
        .btn-secondary { background-color: var(--secondary-btn); color: var(--text-color); }
        .btn-primary { background-color: var(--primary-btn); color: white; }

        /* Error message */
        #error-msg {
            display: none;
            background: #fff0f0;
            border: 1px solid #f5c6cb;
            color: #721c24;
            border-radius: 12px;
            padding: 1rem;
            margin-bottom: 1rem;
            font-size: 0.875rem;
            text-align: left;
            line-height: 1.5;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="brand"><a href="https://www.akvarellskiss.se" target="_blank">www.akvarellskiss.se</a></div>
    <h2>🎨 Artist's Mirror</h2>

    <div id="error-msg"></div>

    <div class="canvas-container">
        <span id="placeholder">Upload image to flip &amp; check</span>
        <canvas id="canvas"></canvas>
    </div>

    <div class="controls">
        <label for="upload" class="upload-label btn-primary">1. Upload Image</label>
        <input type="file" id="upload" accept="image/*">

        <button onclick="flipH()">Flip Horizontal</button>
        <button onclick="flipV()">Flip Vertical</button>
        <button onclick="toggleBW()" class="btn-secondary">B&amp;W Mode</button>
        <button onclick="toggleGrid()" class="btn-secondary">Grid Overlay</button>
        <button onclick="downloadImg()" class="btn-primary">Download</button>
    </div>
</div>

<script>
    const canvas  = document.getElementById('canvas');
    const ctx     = canvas.getContext('2d');
    const upload  = document.getElementById('upload');
    const placeholder = document.getElementById('placeholder');
    const errorMsg    = document.getElementById('error-msg');

    let img     = null;   // Will hold an HTMLImageElement with the (possibly resized) image
    let showBW  = false;
    let showGrid = false;
    let sX = 1;   // horizontal scale (±1 for flip)
    let sV = 1;   // vertical scale   (±1 for flip)

    // ─────────────────────────────────────────────
    //  Helpers
    // ─────────────────────────────────────────────

    function showError(msg) {
        errorMsg.innerHTML = msg;
        errorMsg.style.display = 'block';
    }

    function clearError() {
        errorMsg.style.display = 'none';
        errorMsg.innerHTML = '';
    }

    /** Scale a canvas down so its longest side is ≤ maxPx. Returns the (possibly new) canvas. */
    function resizeToMax(srcCanvas, maxPx) {
        const w = srcCanvas.width;
        const h = srcCanvas.height;
        if (w <= maxPx && h <= maxPx) return srcCanvas;

        const scale = maxPx / Math.max(w, h);
        const out   = document.createElement('canvas');
        out.width   = Math.round(w * scale);
        out.height  = Math.round(h * scale);
        out.getContext('2d').drawImage(srcCanvas, 0, 0, out.width, out.height);
        return out;
    }

    /** Take a canvas and bake it into an HTMLImageElement (async). */
    function canvasToImage(srcCanvas) {
        return new Promise((resolve, reject) => {
            const tmp  = new Image();
            tmp.onload = () => resolve(tmp);
            tmp.onerror = reject;
            tmp.src = srcCanvas.toDataURL('image/jpeg', 0.92);
        });
    }

    // ─────────────────────────────────────────────
    //  Image loading – mobile-safe pipeline
    // ─────────────────────────────────────────────

    upload.addEventListener('change', async (e) => {
        const file = e.target.files[0];
        if (!file) return;

        clearError();

        // 1. Reject HEIC/HEIF early with a helpful message
        const name = file.name.toLowerCase();
        const type = file.type.toLowerCase();
        if (
            type === 'image/heic' || type === 'image/heif' ||
            name.endsWith('.heic') || name.endsWith('.heif')
        ) {
            showError(
                '<strong>HEIC/HEIF format is not supported by browsers.</strong><br>' +
                '📱 <strong>iPhone:</strong> Settings → Camera → Formats → Most Compatible<br>' +
                '📱 <strong>Samsung:</strong> Camera app → Settings → Picture Format → turn off "High efficiency"<br>' +
                'Then retake or re-export the photo as JPEG and upload again.'
            );
            upload.value = '';
            return;
        }

        // 2. Try createImageBitmap with EXIF-aware orientation (fixes rotated Samsung/iPhone photos)
        try {
            const bitmap = await createImageBitmap(file, { imageOrientation: 'from-image' });

            const tmp = document.createElement('canvas');
            tmp.width  = bitmap.width;
            tmp.height = bitmap.height;
            tmp.getContext('2d').drawImage(bitmap, 0, 0);
            bitmap.close();

            const resized = resizeToMax(tmp, 2000);
            img = await canvasToImage(resized);
            showImage();

        } catch (_) {
            // 3. Fallback: FileReader + new Image() for older/limited browsers
            fallbackLoad(file);
        }

        // Reset the input so the same file can be re-selected if needed
        upload.value = '';
    });

    function fallbackLoad(file) {
        const reader = new FileReader();
        reader.onerror = () => showError('Could not read the file. Please try another image.');
        reader.onload  = (ev) => {
            const tmp = new Image();
            tmp.onerror = () => showError('Could not decode the image. Try saving it as JPEG first.');
            tmp.onload  = async () => {
                const tmpCanvas = document.createElement('canvas');
                tmpCanvas.width  = tmp.width;
                tmpCanvas.height = tmp.height;
                tmpCanvas.getContext('2d').drawImage(tmp, 0, 0);

                const resized = resizeToMax(tmpCanvas, 2000);
                img = await canvasToImage(resized);
                showImage();
            };
            tmp.src = ev.target.result;
        };
        reader.readAsDataURL(file);
    }

    function showImage() {
        placeholder.style.display = 'none';
        canvas.style.display = 'block';
        render();
    }

    // ─────────────────────────────────────────────
    //  Rendering
    // ─────────────────────────────────────────────

    function render() {
        if (!img) return;

        canvas.width  = img.width;
        canvas.height = img.height;
        ctx.clearRect(0, 0, canvas.width, canvas.height);

        // Part 1 – draw the image (with optional B&W and flip transforms)
        ctx.save();
        if (showBW) ctx.filter = 'grayscale(100%)';

        ctx.translate(canvas.width / 2, canvas.height / 2);
        ctx.scale(sX, sV);
        ctx.translate(-canvas.width / 2, -canvas.height / 2);

        ctx.drawImage(img, 0, 0);
        ctx.restore();

        // Part 2 – draw grid on top (filter must be reset first)
        ctx.filter = 'none';
        if (showGrid) drawGrid();
    }

    function drawGrid() {
        const w = canvas.width;
        const h = canvas.height;

        // Square cells: cell size based on the shorter side divided into 10
        const cellSize = Math.min(w, h) / 10;

        // Dynamic line width
        ctx.lineWidth = Math.max(1, w / 500);

        // Vertical lines
        for (let x = cellSize; x < w; x += cellSize) {
            drawLine(x, 0, x, h);
        }
        // Horizontal lines
        for (let y = cellSize; y < h; y += cellSize) {
            drawLine(0, y, w, y);
        }
    }

    /** Draws a double (dark + light offset) line for max visibility on any background. */
    function drawLine(x1, y1, x2, y2) {
        ctx.beginPath();
        ctx.strokeStyle = 'rgba(0,0,0,0.4)';
        ctx.moveTo(x1, y1);
        ctx.lineTo(x2, y2);
        ctx.stroke();

        ctx.beginPath();
        ctx.strokeStyle = 'rgba(255,255,255,0.4)';
        ctx.moveTo(x1 + 1, y1 + 1);
        ctx.lineTo(x2 + 1, y2 + 1);
        ctx.stroke();
    }

    // ─────────────────────────────────────────────
    //  Controls
    // ─────────────────────────────────────────────

    function flipH()     { sX *= -1;        render(); }
    function flipV()     { sV *= -1;        render(); }
    function toggleBW()  { showBW   = !showBW;   render(); }
    function toggleGrid(){ showGrid = !showGrid; render(); }

    function downloadImg() {
        if (!img) return;
        const link = document.createElement('a');
        link.download = 'artist-check.png';
        link.href = canvas.toDataURL();
        link.click();
    }
</script>

</body>
</html>
